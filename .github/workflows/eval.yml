name: NormaBot RAGAS Eval

on:
  workflow_dispatch:

jobs:
  ragas-eval:
    name: RAGAS Eval (on EC2)
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Run RAGAS eval via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 260m
          script: |
            cd /home/ubuntu/normabot
            git fetch origin ${{ github.ref_name }} && git reset --hard FETCH_HEAD
            ACTUAL_SHA=$(git rev-parse --verify HEAD)
            docker exec \
              -e GITHUB_SHA="$ACTUAL_SHA" \
              -e PYTHONPATH=/app:/app/eval \
              normabot \
              python eval/run_ragas.py --ci
