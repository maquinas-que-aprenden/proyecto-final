name: NormaBot RAGAS Eval

on:
  workflow_dispatch:

env:
  AWS_REGION: eu-west-1

jobs:
  ragas-eval:
    name: RAGAS Eval (on EC2)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Run RAGAS eval via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/normabot
            docker run --rm \
              -v "$(pwd)/eval:/app/eval" \
              -v "$(pwd)/data/processed/vectorstore:/app/data/processed/vectorstore:ro" \
              --env-file .env \
              -e GITHUB_SHA="${GITHUB_SHA}" \
              -e PYTHONPATH=/app/eval \
              -w /app \
              ghcr.io/maquinas-que-aprenden/proyecto-final:latest \
              python eval/run_ragas.py --ci
