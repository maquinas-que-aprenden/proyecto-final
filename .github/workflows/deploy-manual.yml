name: NormaBot Deploy Manual

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Rama a desplegar"
        required: true
        default: "develop"
        type: string
      deploy_to_ec2:
        description: "Desplegar en EC2 tras el build?"
        required: true
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: "requirements/*.txt"

      - name: Install dev dependencies
        run: pip install -r requirements/dev.txt

      - name: Run ruff check
        run: ruff check . --output-format=github

  test:
    name: Smoke Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: "requirements/*.txt"

      - name: Install system dependencies
        run: sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: |
          pip install -r requirements/base.txt
          pip install -r requirements/ml.txt
          pip install -r requirements/app.txt
          pip install -r requirements/dev.txt

      - name: Run smoke tests
        run: pytest tests/ -v

  build:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sanitize branch name for Docker tag
        id: tag
        run: echo "value=$(echo '${{ inputs.branch }}' | sed 's/[^a-zA-Z0-9._-]/-/g')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max