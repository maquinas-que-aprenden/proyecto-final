---
- name: Configurar DVC y datos en NormaBot
  hosts: normabot
  become: true

  vars:
    project_path: "/home/ubuntu/normabot"
    git_branch: "main"

  tasks:
    - name: Instalar pipx
      apt:
        name: pipx
        state: present

    - name: Instalar DVC con soporte S3
      become: false
      shell: pipx install 'dvc[s3]'
      args:
        creates: /home/ubuntu/.local/bin/dvc

    - name: Asegurar que pipx está en el PATH del sistema
      lineinfile:
        path: /home/ubuntu/.bashrc
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        state: present

    - name: Comprobar si el repositorio ya está clonado
      stat:
        path: "{{ project_path }}/.dvc/config"
      register: dvc_config

    - name: Clonar repositorio (shallow)
      become: false
      shell: |
        cd {{ project_path }}
        git init
        git config core.sparseCheckout false
        rm -f .git/info/sparse-checkout
        git remote remove origin 2>/dev/null || true
        git remote add origin https://github.com/maquinas-que-aprenden/proyecto-final.git
        git fetch --depth 1 origin {{ git_branch }}
        git checkout FETCH_HEAD
      when: not dvc_config.stat.exists

    - name: Corregir permisos de lost+found (creado por root al formatear EBS)
      ansible.builtin.file:
        path: "{{ project_path }}/lost+found"
        owner: ubuntu
        group: ubuntu
        mode: "0755"
      ignore_errors: true

    - name: Hacer pull del vectorstore desde S3
      become: false
      shell: dvc pull data/processed/vectorstore/
      args:
        chdir: "{{ project_path }}"
      environment:
        PATH: "/home/ubuntu/.local/bin:{{ ansible_facts['env']['PATH'] }}"

    - name: Mensaje final
      debug:
        msg: "DVC configurado y vectorstore disponible en {{ project_path }}/data/processed/vectorstore"
