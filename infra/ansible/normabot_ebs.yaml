- name: Configurar EBS en NormaBot (solo al crear la instancia desde cero)
  hosts: normabot
  become: true
  vars:
    project_path: "/home/ubuntu/normabot"
    ebs_device: "/dev/nvme1n1"
    ebs_fstype: "ext4"

  tasks:
    - name: Formatear volumen de datos (solo primera vez)
      community.general.filesystem:
        fstype: "{{ ebs_fstype }}"
        dev: "{{ ebs_device }}"
        force: false

    - name: Montar EBS en project_path
      ansible.builtin.mount:
        path: "{{ project_path }}"
        src: "{{ ebs_device }}"
        fstype: "{{ ebs_fstype }}"
        opts: defaults,nofail
        state: mounted

    - name: Asegurar permisos tras el montaje
      ansible.builtin.file:
        path: "{{ project_path }}"
        owner: ubuntu
        group: ubuntu
        mode: "0755"
        state: directory

    - name: Mensaje final
      ansible.builtin.debug:
        msg: "EBS montado correctamente en {{ project_path }}."