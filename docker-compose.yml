  mlflow-dev:
    image: ghcr.io/mlflow/mlflow
    ports:
      - "5000:5000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_KEY}
    command: >
      mlflow server --host 0.0.0.0 --port 5000 
      --backend-store-uri sqlite:///mlflow_dev.db 
      --default-artifact-root s3://normabot/artifacts/dev

  mlflow-prod:
    image: ghcr.io/mlflow/mlflow
    ports:
      - "5001:5000" # Mapeamos el 5001 externo al 5000 interno del contenedor
    command: >
      mlflow server --host 0.0.0.0 --port 5000 
      --backend-store-uri sqlite:///mlflow_prod.db 
      --default-artifact-root s3://normabot/artifacts/prod